steps:
  - name: python:3.12
    id: "pytest unit test"
    entrypoint: sh
    args:
      - "-c"
      - |
        pip install --upgrade pip --user
        pip install uv
        uv sync --frozen --all-extras --dev
        make test

  # Install and configure Buildx with QEMU
  - name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - '-c'
      - |
        docker run --rm --privileged tonistiigi/binfmt --install all
        docker buildx create --use --name mybuilder

  - name: gcr.io/cloud-builders/docker
    id: "Tag and build and push docker image"
    entrypoint: sh
    args:
      - "-c"
      - |
        docker buildx build -f _infra/docker/Dockerfile --platform linux/amd64,linux/arm64 -t europe-west2-docker.pkg.dev/${_RELEASE}/${_GAR_REPOSITORY}/mock-eq:${SHORT_SHA} --push .

  - name: gcr.io/cloud-builders/helm
    id: Install helm & build/push
    entrypoint: sh
    args:
      - '-c'
      - |
        helm package ._infra/helm/mock-eq --destination ./package && \
        gcloud auth configure-docker europe-west2-docker.pkg.dev && \
        helm push $(ls ./package/*.tgz | head -n1) oci://europe-west2-docker.pkg.dev/${_RELEASE}/${_HELM_REPO}
